# ==========================================
# 校园通知爬虫 + 推送 配置文件
# 合肥工业大学（HFUT）微电子学院
# ==========================================
# 敏感信息（邮箱密码等）可通过环境变量覆盖：
#   EMAIL_SENDER=your@qq.com
#   EMAIL_PASSWORD=your_smtp_code
#   EMAIL_RECIPIENTS=user1@qq.com,user2@gmail.com
#   DINGTALK_WEBHOOK=https://oapi.dingtalk.com/robot/send?access_token=xxx
#   DINGTALK_SECRET=your_secret
#   FEISHU_WEBHOOK=https://open.feishu.cn/open-apis/bot/v2/hook/xxx

# ---------- 爬取目标 ----------
targets:
  - name: 微电子学院
    url: http://wdzxy.hfut.edu.cn/
    base_url: http://wdzxy.hfut.edu.cn
    list_pages:
      - url: http://wdzxy.hfut.edu.cn/11462/list.htm
        section: 通知公告
      - url: http://wdzxy.hfut.edu.cn/xsgz/list.htm
        section: 学工动态
    link_patterns:
      - c11462a
      - c9899a

  - name: 合工大主站
    url: https://www.hfut.edu.cn/
    base_url: https://www.hfut.edu.cn
    list_pages:
      - url: https://www.hfut.edu.cn/xwdt/tzgg.htm
        section: 通知公告
    link_patterns:
      - info/

  - name: 教务处
    url: https://jwc.hfut.edu.cn/
    base_url: https://jwc.hfut.edu.cn
    list_pages:
      - url: https://jwc.hfut.edu.cn/
        section: 通知公告
    link_patterns:
      - /info/

  - name: 学工部
    url: https://xgb.hfut.edu.cn/
    base_url: https://xgb.hfut.edu.cn
    list_pages:
      - url: https://xgb.hfut.edu.cn/tzgg.htm
        section: 通知公告
    link_patterns:
      - /info/

  - name: 团委
    url: https://tuanwei.hfut.edu.cn/
    base_url: https://tuanwei.hfut.edu.cn
    list_pages:
      - url: https://tuanwei.hfut.edu.cn/736/list.htm
        section: 通知公告
    link_patterns:
      - c736a

# ---------- 通知渠道 ----------
channels:
  # 邮件通知（QQ 邮箱）
  email:
    enabled: true
    smtp_server: smtp.qq.com
    smtp_port: 465
    sender_email: "1472433810@qq.com"
    sender_password: "your_smtp_code"     # TODO: 替换为 QQ邮箱授权码
    recipients:
      - "1472433810@qq.com"

  # 钉钉机器人（可选）
  dingtalk:
    enabled: false
    webhook: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
    secret: "YOUR_SECRET"

  # 飞书机器人（可选）
  feishu:
    enabled: false
    webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_HOOK"

# ---------- 调度配置 ----------
schedule:
  lookback_days: 1
